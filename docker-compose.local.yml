services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    command: npm run dev
    stdin_open: true
    tty: true

  # Optional: Add a mock API service for local development
  # mock-api:
  #   image: json-server:latest
  #   ports:
  #     - "3001:3000"
  #   volumes:
  #     - ./mock-data:/data
  #   command: --watch /data/db.json